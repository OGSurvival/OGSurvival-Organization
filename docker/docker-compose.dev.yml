version: '3.8'

services:
  ogsurvival-dev:
    image: ghcr.io/ogsurvival/ogsurvival-organization:dev-latest
    container_name: ogsurvival-dev
    restart: unless-stopped
    environment:
      - ENVIRONMENT=dev
      - DEBUG=true
      - LOG_LEVEL=debug
      - DATABASE_URL=${DEV_DATABASE_URL}
      - API_KEY=${DEV_API_KEY}
      - REDIS_URL=${DEV_REDIS_URL}
    ports:
      - "${DEV_PORT:-8080}:8080"
    volumes:
      - dev_data:/app/data
      - dev_logs:/app/logs
    networks:
      - ogsurvival-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis-dev:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - ogsurvival-dev

volumes:
  dev_data:
  dev_logs:
  redis_dev_data:

networks:
  ogsurvival-dev:
    driver: bridge