version: '3.8'

services:
  ogsurvival-test:
    image: ghcr.io/ogsurvival/ogsurvival-organization:test-latest
    container_name: ogsurvival-test
    restart: unless-stopped
    environment:
      - ENVIRONMENT=test
      - DEBUG=false
      - LOG_LEVEL=info
      - DATABASE_URL=${TEST_DATABASE_URL}
      - API_KEY=${TEST_API_KEY}
      - REDIS_URL=${TEST_REDIS_URL}
      - MONITORING_ENABLED=true
    ports:
      - "${TEST_PORT:-8081}:8080"
    volumes:
      - test_data:/app/data
      - test_logs:/app/logs
    networks:
      - ogsurvival-test
    depends_on:
      - redis-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis-test:
    image: redis:7-alpine
    container_name: redis-test
    restart: unless-stopped
    ports:
      - "${TEST_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_test_data:/data
    networks:
      - ogsurvival-test

  test-runner:
    image: ghcr.io/ogsurvival/ogsurvival-organization:test-latest
    container_name: test-runner
    environment:
      - ENVIRONMENT=test
      - TEST_MODE=true
      - TARGET_HOST=ogsurvival-test
      - TARGET_PORT=8080
    depends_on:
      - ogsurvival-test
    networks:
      - ogsurvival-test
    profiles:
      - testing

volumes:
  test_data:
  test_logs:
  redis_test_data:

networks:
  ogsurvival-test:
    driver: bridge